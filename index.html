    <!--
      Preconnect to Google Fonts origins before the stylesheet request fires.
      This eliminates the DNS + TCP + TLS handshake from the critical path and
      improves LCP on first visit. The crossorigin attribute is required for
      the font files origin (fonts.gstatic.com).
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      Load fonts via <link> rather than CSS @import.
      @import in CSS is render-blocking; a <link> here is parallel-fetched.
      display=swap prevents invisible text during font load (avoids FOIT).
      The @import line in src/index.css should be removed — fonts are now
      loaded from here.
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap"
    />
